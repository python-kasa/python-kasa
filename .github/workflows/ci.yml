---
name: CI

on:
  push:
    branches:
      - master
      - patch
  pull_request:
    branches:
      - master
      - patch
      - 'feat/**'
      - 'fix/**'
      - 'janitor/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Perform Lint Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.14]
    steps:
      - name: Checkout Source Files
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        id: setup-environment
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}
          cache-pre-commit: true
          uv-install-options: --all-extras

      - name: Run pre-commit Checks
        id: run-pre-commit
        shell: bash
        run: |
          uv run pre-commit run --all-files --verbose

  tests:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: [3.11, 3.12, 3.13, 3.14]
    steps:
      - name: Checkout Source Files
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        id: setup-environment
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run PyTests with Code Coverage
        id: run-pytests-with-code-coverage
        shell: bash
        run: |
          uv run pytest --fixture-set representative -n auto --cov kasa --cov-report xml

      - name: Upload Code Coverage to Codecov
        id: upload-code-coverage-to-codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  full-fixture-tests:
    name: Full Fixture Test Suite on Python 3.14 (all extras)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Files
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        id: setup-environment
        uses: ./.github/actions/setup
        with:
          python-version: 3.14
          uv-install-options: --all-extras

      - name: Run Full PyTest Suite with Code Coverage
        id: run-full-pytests-with-code-coverage
        shell: bash
        run: |
          uv run pytest --fixture-set all -n auto --cov kasa --cov-report xml

      - name: Upload Code Coverage to Codecov
        id: upload-code-coverage-to-codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  windows-tests:
    name: Python ${{ matrix.python-version }} on windows-latest
    needs: lint
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.11, 3.12, 3.13, 3.14]
    steps:
      - name: Checkout Source Files
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run PyTests with Code Coverage
        id: run-pytests-with-code-coverage
        shell: bash
        run: |
          uv run pytest --fixture-set representative -n auto --cov kasa --cov-report xml

      - name: Upload Code Coverage to Codecov
        id: upload-code-coverage-to-codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
