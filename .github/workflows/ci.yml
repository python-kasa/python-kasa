---
name: CI

on:
  push:
    branches:
      - master
      - patch
  pull_request:
    branches:
      - master
      - patch
      - 'feat/**'
      - 'fix/**'
      - 'janitor/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Perform Lint Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.14]
    steps:
      - name: Checkout Source Files
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        id: setup-environment
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}
          cache-pre-commit: true
          uv-install-options: --all-extras

      - name: Run pre-commit Checks
        id: run-pre-commit
        shell: bash
        run: |
          uv run pre-commit run --all-files --verbose

  windows-shards:
    name: Calculate Windows Test Shard Batches
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.calculate_windows_shards.outputs.matrix }}
    steps:
      - name: Checkout Source Files
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: ./.github/actions/setup
        with:
          python-version: 3.14
          uv-install-options: --all-extras

      - name: Calculate Windows Test Shard Batches
        id: calculate_windows_shards
        shell: bash
        run: |
          shard_size=3500
          shards_per_job=4
          collection=$(uv run pytest --collect-only -q)
          test_count=$(grep -oE '[0-9]+ tests? collected' <<< "$collection" | tail -1 | cut -d' ' -f1)
          if [[ -z "$test_count" ]]; then
            echo "Unable to determine the collected test count" >&2
            exit 1
          fi
          shard_count=$(( (test_count + shard_size - 1) / shard_size ))
          include='[]'
          for python_version in 3.11 3.12 3.13 3.14; do
            for ((shard_start = 0; shard_start < shard_count; shard_start += shards_per_job)); do
              shard_end=$(( shard_start + shards_per_job ))
              if (( shard_end > shard_count )); then
                shard_end=$shard_count
              fi
              shard_group=$(( shard_start / shards_per_job + 1 ))
              include=$(jq -c \
                --arg python_version "$python_version" \
                --argjson shard_start "$shard_start" \
                --argjson shard_end "$shard_end" \
                --arg shard_group "$shard_group" \
                '. + [{"python-version": $python_version, "shard_start": $shard_start, "shard_end": $shard_end, "shard_group": $shard_group}]' \
                <<< "$include")
            done
          done
          echo "matrix={\"include\":$include}" >> "$GITHUB_OUTPUT"

  tests:
    name: Python ${{ matrix.python-version}} on ${{ matrix.os }}${{ fromJSON('[" (extras)", ""]')[matrix.extras == ''] }}
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        extras: [false, true]
        python-version: [3.11, 3.12, 3.13, 3.14]
        exclude:
          - os: macos-latest
            extras: true
    steps:
      - name: Checkout Source Files
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        id: setup-environment
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}
          uv-install-options: ${{ matrix.extras == true && '--all-extras' || '' }}

      - name: Run PyTests with Code Coverage
        id: run-pytests-with-code-coverage
        shell: bash
        run: |
          uv run pytest -n auto --cov kasa --cov-report xml

      - name: Upload Code Coverage to Codecov
        id: upload-code-coverage-to-codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  windows-tests:
    name: Python ${{ matrix.python-version }} on windows-latest (shard group ${{ matrix.shard_group }})
    needs: [lint, windows-shards]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.windows-shards.outputs.matrix) }}
    steps:
      - name: Checkout Source Files
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run PyTests with Code Coverage
        shell: bash
        run: |
          shard_size=3500
          uv run coverage erase
          for ((shard_index = ${{ matrix.shard_start }}; shard_index < ${{ matrix.shard_end }}; shard_index++)); do
            shard_temp="$RUNNER_TEMP/pytest-temp-$shard_index"
            shard_cache="$RUNNER_TEMP/pytest-cache-$shard_index"
            echo "::group::Shard $((shard_index + 1))"
            COVERAGE_FILE=".coverage.shard-$shard_index" uv run pytest \
              -n auto \
              --shard-index "$shard_index" \
              --shard-size "$shard_size" \
              --basetemp "$shard_temp" \
              -o cache_dir="$shard_cache" \
              --cov kasa \
              --cov-report=
            for cleanup_path in "$shard_temp" "$shard_cache"; do
              case "$cleanup_path" in
                "$RUNNER_TEMP"/*) rm -rf -- "$cleanup_path" ;;
                *) echo "Refusing to clean path outside RUNNER_TEMP: $cleanup_path" >&2; exit 1 ;;
              esac
            done
            echo "::endgroup::"
          done
          uv run coverage combine
          uv run coverage xml

      - name: Upload Code Coverage to Codecov
        id: upload-code-coverage-to-codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
