---
name: CI

on:
  push:
    branches:
      - master
      - patch
  pull_request:
    branches:
      - master
      - patch
      - 'feat/**'
      - 'fix/**'
      - 'janitor/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Perform Lint Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.14]
    steps:
      - name: Checkout Source Files
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        id: setup-environment
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}
          cache-pre-commit: true
          uv-install-options: --all-extras

      - name: Run pre-commit Checks
        id: run-pre-commit
        shell: bash
        run: |
          uv run pre-commit run --all-files --verbose

  tests:
    name: Python ${{ matrix.python-version}} on ${{ matrix.os }}${{ fromJSON('[" (extras)", ""]')[matrix.extras == ''] }}
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        extras: [false, true]
        python-version: [3.11, 3.12, 3.13, 3.14]
        exclude:
          - os: macos-latest
            extras: true
    steps:
      - name: Checkout Source Files
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        id: setup-environment
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}
          uv-install-options: ${{ matrix.extras == true && '--all-extras' || '' }}

      - name: Run PyTests with Code Coverage
        id: run-pytests-with-code-coverage
        shell: bash
        run: |
          uv run pytest -n auto --cov kasa --cov-report xml

      - name: Upload Code Coverage to Codecov
        id: upload-code-coverage-to-codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  windows-tests:
    name: Python ${{ matrix.python-version }} on windows-latest
    needs: lint
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.11, 3.12, 3.13, 3.14]
    steps:
      - name: Checkout Source Files
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run PyTests with Code Coverage
        shell: bash
        run: |
          shard_size=3800
          collection=$(uv run pytest --collect-only -q)
          test_count=$(grep -oE '[0-9]+ tests? collected' <<< "$collection" | tail -1 | cut -d' ' -f1)
          if [[ -z "$test_count" ]]; then
            echo "Unable to determine the collected test count" >&2
            exit 1
          fi
          shard_count=$(( (test_count + shard_size - 1) / shard_size ))
          uv run coverage erase
          for ((shard_index = 0; shard_index < shard_count; shard_index++)); do
            echo "::group::Shard $((shard_index + 1)) of $shard_count"
            uv run pytest \
              -n auto \
              --shard-index "$shard_index" \
              --shard-size "$shard_size" \
              --cov kasa \
              --cov-append \
              --cov-report=
            echo "::endgroup::"
          done
          uv run coverage xml

      - name: Upload Code Coverage to Codecov
        id: upload-code-coverage-to-codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
