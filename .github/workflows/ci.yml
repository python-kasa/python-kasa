---
name: CI

on:
  push:
    branches:
      - master
      - patch
  pull_request:
    branches:
      - master
      - patch
      - 'feat/**'
      - 'fix/**'
      - 'janitor/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Perform Lint Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.14]
    steps:
      - name: Checkout Source Files
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        id: setup-environment
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}
          cache-pre-commit: true
          uv-install-options: --all-extras

      - name: Run pre-commit Checks
        id: run-pre-commit
        shell: bash
        run: |
          uv run pre-commit run --all-files --verbose

  windows-shards:
    name: Calculate Windows Test Shards
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.calculate_windows_shards.outputs.matrix }}
    steps:
      - name: Checkout Source Files
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: ./.github/actions/setup
        with:
          python-version: 3.14
          uv-install-options: --all-extras

      - name: Calculate Windows Test Shards
        id: calculate_windows_shards
        shell: bash
        run: |
          shard_size=3800
          collection=$(uv run pytest --collect-only -q)
          test_count=$(grep -oE '[0-9]+ tests? collected' <<< "$collection" | tail -1 | cut -d' ' -f1)
          if [[ -z "$test_count" ]]; then
            echo "Unable to determine the collected test count" >&2
            exit 1
          fi
          shard_count=$(( (test_count + shard_size - 1) / shard_size ))
          include='[]'
          for python_version in 3.11 3.12 3.13 3.14; do
            for ((shard_index = 0; shard_index < shard_count; shard_index++)); do
              include=$(jq -c \
                --arg python_version "$python_version" \
                --argjson shard_index "$shard_index" \
                '. + [{"python-version": $python_version, "shard_index": $shard_index}]' \
                <<< "$include")
            done
          done
          echo "matrix={\"include\":$include}" >> "$GITHUB_OUTPUT"

  tests:
    name: Python ${{ matrix.python-version}} on ${{ matrix.os }}${{ fromJSON('[" (extras)", ""]')[matrix.extras == ''] }}
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: [3.11, 3.12, 3.13, 3.14]
        os: [ubuntu-latest, macos-latest]
        extras: [false, true]
        exclude:
          - os: macos-latest
            extras: true
    steps:
      - name: Checkout Source Files
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        id: setup-environment
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}
          uv-install-options: ${{ matrix.extras == true && '--all-extras' || '' }}

      - name: Run PyTests with Code Coverage
        id: run-pytests-with-code-coverage
        shell: bash
        run: |
          uv run pytest -n auto --cov kasa --cov-report xml

      - name: Upload Code Coverage to Codecov
        id: upload-code-coverage-to-codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  windows-tests:
    name: Python ${{ matrix.python-version }} on windows-latest (shard ${{ matrix.shard_index }})
    needs: [lint, windows-shards]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJSON(needs.windows-shards.outputs.matrix) }}
    steps:
      - name: Checkout Source Files
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run PyTest Shard with Code Coverage
        shell: bash
        run: |
          uv run pytest \
            -n auto \
            --shard-index ${{ matrix.shard_index }} \
            --shard-size 3800 \
            --cov kasa \
            --cov-report=
          mv .coverage ".coverage.windows-py${{ matrix.python-version }}-shard${{ matrix.shard_index }}"

      - name: Upload Code Coverage Data
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-coverage-py${{ matrix.python-version }}-shard${{ matrix.shard_index }}
          path: .coverage.windows-py${{ matrix.python-version }}-shard${{ matrix.shard_index }}
          if-no-files-found: error

  windows-coverage:
    name: Combine Windows Code Coverage
    needs: windows-tests
    runs-on: windows-latest
    steps:
      - name: Checkout Source Files
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: ./.github/actions/setup
        with:
          python-version: 3.14

      - name: Download Code Coverage Data
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: windows-coverage-*
          path: coverage-data
          merge-multiple: true

      - name: Combine Code Coverage
        shell: bash
        run: |
          uv run coverage combine coverage-data
          uv run coverage xml

      - name: Upload Code Coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
